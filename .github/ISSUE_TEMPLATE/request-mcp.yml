name: Request an MCP
description: Ask the maintainer to add an MCP to the teleport catalog (you're a user, not the MCP author).
title: "[Request] "
labels: ["mcp-request"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template if you want teleport to support an MCP you use. Before opening, check the [MCP Request Board](../../issues?q=is%3Aissue+label%3Amcp-request) — if it's already requested, thumbs-up there instead of opening a duplicate.

        If you are the MCP's author and want to contribute your own SKILL.md, see [CONTRIBUTING.md](../../blob/main/CONTRIBUTING.md) instead.

  - type: input
    id: service
    attributes:
      label: Service name
      description: What's the service called?
      placeholder: e.g. Airtable, Todoist, Pipedrive
    validations:
      required: true

  - type: input
    id: registry
    attributes:
      label: Registry link
      description: Link to the MCP on Anthropic MCP Registry, Smithery, or Glama. Teleport only catalogs MCPs that are already vetted on a trusted registry.
      placeholder: https://glama.ai/mcp/servers/...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Why you want this
      description: One or two sentences on what you'd use it for. Helps prioritize.
      placeholder: I use Airtable as my app's backend and want Claude Code to query records directly.
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: I checked the MCP Request Board and this isn't already requested
          required: true
        - label: The registry link above shows automated security checks or editorial review
          required: true
